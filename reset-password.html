<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva contraseña — Planes nutricionales</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: "#2c3e50", accent: "#27ae60" },
          fontFamily: { sans: ["Inter", "sans-serif"], display: ["Outfit", "sans-serif"] },
        },
      },
    };
  </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-brand via-slate-900 to-black font-sans text-gray-200 antialiased">
  <div class="mx-auto flex min-h-screen max-w-md flex-col justify-center px-6 py-12">
    <div class="rounded-2xl border border-white/10 bg-white/5 p-8 backdrop-blur">
      <h1 class="font-display text-2xl font-bold text-white">Elige tu nueva contraseña</h1>
      <p class="mt-2 text-sm text-gray-400">Escribe una contraseña nueva para tu cuenta.</p>
      <form id="form" class="mt-8 space-y-4">
        <div>
          <label for="password" class="block text-sm font-medium text-gray-300">Nueva contraseña</label>
          <input id="password" type="password" required minlength="6" autocomplete="new-password"
            class="mt-1 w-full rounded-lg border border-white/10 bg-black/30 px-3 py-2 text-white placeholder-gray-500 focus:border-accent focus:outline-none focus:ring-1 focus:ring-accent" />
        </div>
        <div>
          <label for="password2" class="block text-sm font-medium text-gray-300">Confirmar contraseña</label>
          <input id="password2" type="password" required minlength="6" autocomplete="new-password"
            class="mt-1 w-full rounded-lg border border-white/10 bg-black/30 px-3 py-2 text-white placeholder-gray-500 focus:border-accent focus:outline-none focus:ring-1 focus:ring-accent" />
        </div>
        <p id="err" class="hidden text-sm text-red-400" role="alert"></p>
        <p id="ok" class="hidden text-sm text-green-400" role="status"></p>
        <button type="submit" id="btn"
          class="w-full rounded-lg bg-accent py-2.5 font-semibold text-white transition hover:opacity-90 disabled:opacity-50">
          Guardar contraseña
        </button>
      </form>
    </div>
  </div>

  <script src="/js/supabase-config.js"></script>
  <script type="module">
    import { getSupabase } from "/js/supabase-init.js";

    const form = document.getElementById("form");
    const err = document.getElementById("err");
    const ok = document.getElementById("ok");
    const btn = document.getElementById("btn");

    let supabase;
    try {
      supabase = getSupabase();
    } catch (e) {
      err.textContent = e.message;
      err.classList.remove("hidden");
      btn.disabled = true;
    }

    if (supabase) {
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        err.classList.add("hidden");
        ok.classList.add("hidden");

        const password = document.getElementById("password").value;
        const password2 = document.getElementById("password2").value;

        if (password !== password2) {
          err.textContent = "Las contraseñas no coinciden.";
          err.classList.remove("hidden");
          return;
        }

        btn.disabled = true;
        const { error } = await supabase.auth.updateUser({ password });
        btn.disabled = false;

        if (error) {
          err.textContent = error.message;
          err.classList.remove("hidden");
          return;
        }

        ok.textContent = "Contraseña actualizada. Redirigiendo...";
        ok.classList.remove("hidden");
        setTimeout(() => window.location.replace("/app.html"), 1500);
      });
    }
  </script>
</body>
</html>
