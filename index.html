<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planes nutricionales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#2c3e50',
                        accent: '#27ae60',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                },
            },
        };
    </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-brand via-slate-900 to-black font-sans text-gray-200 antialiased">
    <div class="mx-auto flex min-h-screen max-w-3xl flex-col justify-center px-6 py-16">
        <header class="mb-12 text-center">
            <p class="mb-2 text-sm font-medium uppercase tracking-widest text-accent">Nutrición deportiva</p>
            <h1 class="font-display text-4xl font-bold text-white sm:text-5xl">Planes personalizados</h1>
            <p class="mx-auto mt-4 max-w-xl text-gray-400">
                Cada cliente accede con su correo y contraseña y solo ve el plan asignado a su cuenta.
            </p>
        </header>

        <div class="flex justify-center">
            <a
                href="/login.html"
                class="inline-flex rounded-xl bg-accent px-8 py-3 font-semibold text-white shadow-lg transition hover:opacity-90"
            >
                Ingresar a mi plan
            </a>
        </div>

        <footer class="mt-16 text-center text-xs text-gray-500">
            Si aún no tienes acceso, solicita tu usuario al nutricionista.
        </footer>
    </div>

    <!-- Invitaciones / magic links de Supabase redirigen a la Site URL (#access_token=… o ?code=…).
         Sin esto, la raíz no “absorbe” la sesión y parece que solo abres la app. -->
    <script src="/js/supabase-config.js"></script>
    <script type="module">
        import { getSupabase } from "/js/supabase-init.js";

        function stripAuthFromUrl() {
            const p = window.location.pathname;
            const q = window.location.search;
            window.history.replaceState(null, "", p + q);
        }

        (async () => {
            try {
                const sb = getSupabase();

                const onRoot = () => {
                    const p = window.location.pathname;
                    return p === "/" || p === "/index.html";
                };

                const goApp = () => {
                    stripAuthFromUrl();
                    window.location.replace("/app.html");
                };

                const {
                    data: { session: existing },
                } = await sb.auth.getSession();
                if (existing && onRoot()) {
                    goApp();
                    return;
                }

                sb.auth.onAuthStateChange((event, session) => {
                    if (!session || !onRoot()) return;
                    if (event === "SIGNED_IN" || event === "INITIAL_SESSION") {
                        goApp();
                    }
                });
            } catch (_) {
                /* build sin supabase-config */
            }
        })();
    </script>
</body>
</html>
