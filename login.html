<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar — Planes nutricionales</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: "#2c3e50", accent: "#27ae60" },
          fontFamily: { sans: ["Inter", "sans-serif"], display: ["Outfit", "sans-serif"] },
        },
      },
    };
  </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-brand via-slate-900 to-black font-sans text-gray-200 antialiased">
  <div class="mx-auto flex min-h-screen max-w-md flex-col justify-center px-6 py-12">
    <a href="/" class="mb-8 text-center text-sm text-gray-400 hover:text-white">← Volver al inicio</a>
    <div class="rounded-2xl border border-white/10 bg-white/5 p-8 backdrop-blur">
      <h1 class="font-display text-2xl font-bold text-white">Acceso a tu plan</h1>
      <p class="mt-2 text-sm text-gray-400">Usa el correo y contraseña que te indicaron.</p>
      <form id="form" class="mt-8 space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-300">Correo</label>
          <input id="email" type="email" required autocomplete="username"
            class="mt-1 w-full rounded-lg border border-white/10 bg-black/30 px-3 py-2 text-white placeholder-gray-500 focus:border-accent focus:outline-none focus:ring-1 focus:ring-accent" />
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-300">Contraseña</label>
          <input id="password" type="password" required autocomplete="current-password"
            class="mt-1 w-full rounded-lg border border-white/10 bg-black/30 px-3 py-2 text-white placeholder-gray-500 focus:border-accent focus:outline-none focus:ring-1 focus:ring-accent" />
        </div>
        <p id="err" class="hidden text-sm text-red-400" role="alert"></p>
        <p id="recovery-ok" class="hidden text-sm text-green-400" role="status"></p>
        <button type="submit" id="btn"
          class="w-full rounded-lg bg-accent py-2.5 font-semibold text-white transition hover:opacity-90 disabled:opacity-50">
          Entrar
        </button>
        <button type="button" id="forgot-btn" class="w-full text-sm text-gray-400 hover:text-accent mt-2">
          Olvidaste tu contraseña?
        </button>
      </form>

      <!-- Divider -->
      <div class="my-6 flex items-center gap-3">
        <div class="h-px flex-1 bg-white/10"></div>
        <span class="text-xs text-gray-500">o</span>
        <div class="h-px flex-1 bg-white/10"></div>
      </div>

      <!-- Google OAuth -->
      <button type="button" id="google-btn"
        class="flex w-full items-center justify-center gap-3 rounded-lg border border-white/20 bg-white/5 py-2.5 text-sm font-medium text-gray-200 transition hover:bg-white/10 disabled:opacity-50">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.01 24.01 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Ingresar con Google
      </button>
    </div>

    <p class="mt-6 text-center text-sm text-gray-400">
      No tienes cuenta?
      <a href="/register.html" class="text-accent hover:underline">Crear una</a>
    </p>
  </div>
  <script src="/js/supabase-config.js"></script>
  <script type="module">
    import { getSupabase } from "/js/supabase-init.js";

    const form = document.getElementById("form");
    const err = document.getElementById("err");
    const btn = document.getElementById("btn");

    let supabase;
    try {
      supabase = getSupabase();
    } catch (e) {
      err.textContent = e.message;
      err.classList.remove("hidden");
      btn.disabled = true;
    }

    if (supabase) {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        window.location.replace("/app.html");
      }

      supabase.auth.onAuthStateChange((_e, s) => {
        if (s) window.location.replace("/app.html");
      });

      document.getElementById("google-btn").addEventListener("click", async () => {
        const gBtn = document.getElementById("google-btn");
        gBtn.disabled = true;
        const { error } = await supabase.auth.signInWithOAuth({
          provider: "google",
          options: { redirectTo: window.location.origin + "/app.html" },
        });
        if (error) {
          err.textContent = error.message;
          err.classList.remove("hidden");
          gBtn.disabled = false;
        }
      });

      document.getElementById("forgot-btn").addEventListener("click", async () => {
        err.classList.add("hidden");
        const recoveryOk = document.getElementById("recovery-ok");
        recoveryOk.classList.add("hidden");
        const email = document.getElementById("email").value.trim();
        if (!email) {
          err.textContent = "Escribe tu correo arriba para recuperar la contraseña.";
          err.classList.remove("hidden");
          return;
        }
        const forgotBtn = document.getElementById("forgot-btn");
        forgotBtn.disabled = true;
        const { error } = await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + "/",
        });
        forgotBtn.disabled = false;
        if (error) {
          err.textContent = error.message;
          err.classList.remove("hidden");
          return;
        }
        recoveryOk.textContent = "Revisa tu correo. Te enviamos un enlace para crear una nueva contraseña.";
        recoveryOk.classList.remove("hidden");
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        err.classList.add("hidden");
        btn.disabled = true;
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        btn.disabled = false;
        if (error) {
          err.textContent = error.message === "Invalid login credentials"
            ? "Correo o contraseña incorrectos."
            : error.message;
          err.classList.remove("hidden");
          return;
        }
        window.location.replace("/app.html");
      });
    }
  </script>
</body>
</html>
