<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear cuenta — Planes nutricionales</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: "#2c3e50", accent: "#27ae60" },
          fontFamily: { sans: ["Inter", "sans-serif"], display: ["Outfit", "sans-serif"] },
        },
      },
    };
  </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-brand via-slate-900 to-black font-sans text-gray-200 antialiased">
  <div class="mx-auto flex min-h-screen max-w-md flex-col justify-center px-6 py-12">
    <a href="/" class="mb-8 text-center text-sm text-gray-400 hover:text-white">&larr; Volver al inicio</a>
    <div class="rounded-2xl border border-white/10 bg-white/5 p-8 backdrop-blur">
      <h1 class="font-display text-2xl font-bold text-white">Crear cuenta</h1>
      <p class="mt-2 text-sm text-gray-400">Registra tu correo para acceder a tus planes.</p>

      <form id="form" class="mt-8 space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-300">Correo</label>
          <input id="email" type="email" required autocomplete="email"
            class="mt-1 w-full rounded-lg border border-white/10 bg-black/30 px-3 py-2 text-white placeholder-gray-500 focus:border-accent focus:outline-none focus:ring-1 focus:ring-accent" />
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-300">Contrasena</label>
          <input id="password" type="password" required minlength="6" autocomplete="new-password"
            class="mt-1 w-full rounded-lg border border-white/10 bg-black/30 px-3 py-2 text-white placeholder-gray-500 focus:border-accent focus:outline-none focus:ring-1 focus:ring-accent" />
        </div>
        <div>
          <label for="password2" class="block text-sm font-medium text-gray-300">Confirmar contrasena</label>
          <input id="password2" type="password" required minlength="6" autocomplete="new-password"
            class="mt-1 w-full rounded-lg border border-white/10 bg-black/30 px-3 py-2 text-white placeholder-gray-500 focus:border-accent focus:outline-none focus:ring-1 focus:ring-accent" />
        </div>
        <p id="err" class="hidden text-sm text-red-400" role="alert"></p>
        <p id="ok" class="hidden text-sm text-green-400" role="status"></p>
        <button type="submit" id="btn"
          class="w-full rounded-lg bg-accent py-2.5 font-semibold text-white transition hover:opacity-90 disabled:opacity-50">
          Crear cuenta
        </button>
      </form>

      <!-- Divider -->
      <div class="my-6 flex items-center gap-3">
        <div class="h-px flex-1 bg-white/10"></div>
        <span class="text-xs text-gray-500">o</span>
        <div class="h-px flex-1 bg-white/10"></div>
      </div>

      <!-- Google OAuth -->
      <button type="button" id="google-btn"
        class="flex w-full items-center justify-center gap-3 rounded-lg border border-white/20 bg-white/5 py-2.5 text-sm font-medium text-gray-200 transition hover:bg-white/10 disabled:opacity-50">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.01 24.01 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Registrarse con Google
      </button>
    </div>

    <p class="mt-6 text-center text-sm text-gray-400">
      Ya tienes cuenta?
      <a href="/login.html" class="text-accent hover:underline">Iniciar sesion</a>
    </p>
  </div>

  <script src="/js/supabase-config.js"></script>
  <script type="module">
    import { getSupabase } from "/js/supabase-init.js";

    const form = document.getElementById("form");
    const err = document.getElementById("err");
    const ok = document.getElementById("ok");
    const btn = document.getElementById("btn");
    const googleBtn = document.getElementById("google-btn");

    function showErr(msg) {
      ok.classList.add("hidden");
      err.textContent = msg;
      err.classList.remove("hidden");
    }

    let supabase;
    try {
      supabase = getSupabase();
    } catch (e) {
      showErr(e.message);
      btn.disabled = true;
      googleBtn.disabled = true;
    }

    if (supabase) {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) window.location.replace("/app.html");

      supabase.auth.onAuthStateChange((_e, s) => {
        if (s) window.location.replace("/app.html");
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        err.classList.add("hidden");
        ok.classList.add("hidden");

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const password2 = document.getElementById("password2").value;

        if (password !== password2) {
          showErr("Las contrasenas no coinciden.");
          return;
        }

        btn.disabled = true;
        const { data, error } = await supabase.auth.signUp({ email, password });
        btn.disabled = false;

        if (error) {
          showErr(error.message);
          return;
        }

        // If email confirmation is required, session will be null
        if (data.user && !data.session) {
          ok.textContent = "Cuenta creada. Revisa tu correo para confirmar tu cuenta.";
          ok.classList.remove("hidden");
          form.reset();
          return;
        }

        // Session created immediately → onAuthStateChange will redirect
      });

      googleBtn.addEventListener("click", async () => {
        googleBtn.disabled = true;
        const { error } = await supabase.auth.signInWithOAuth({
          provider: "google",
          options: { redirectTo: window.location.origin + "/app.html" },
        });
        if (error) {
          showErr(error.message);
          googleBtn.disabled = false;
        }
      });
    }
  </script>
</body>
</html>
